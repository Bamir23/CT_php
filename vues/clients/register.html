<div class="auth-container">
    <h2>Inscription</h2>
    <form id="register-form">
        <label for="nom">Nom</label>
        <input type="text" name="nom" id="nom"><br>
        <label for="prenom">Prenom</label>
        <input type="text" name="prenom" id="prenom"><br>
        <label for="email">Email</label>
        <input type="email" name="email" id="email" placeholder="email@email.com"><br>
        <label for="mot_de_passe">Mot de passe</label>
        <input type="password" name="mot_de_passe" id="mot_de_passe"><br>
        <label for="confirmer_mot_de_passe">Confirmer mot de passe</label>
        <input type="password" name="confirmer_mot_de_passe" id="confirmer_mot_de_passe"><br>
        <button type="submit">S'inscrire</button><br>
    </form>
</div>
